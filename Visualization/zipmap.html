const width = 860, height = 680;

const svg = d3.select("#choropleth").attr("width", width).attr("height", height);
const tooltip = d3.select("#tooltip");

const color = d3.scaleQuantize().range(d3.schemeBlues[6]);

function getZip(props) {
    return String(props.ZCTA5CE10 || props.zip || props.ZIP ||
                  props.postal_code || props.ZIPCODE || props.modzcta || "")
           .padStart(5, "0");
}

const valueMap   = new Map(POP_DATA.map(d => [d.zip, d.pop]));
const boroughMap = new Map(POP_DATA.map(d => [d.zip, d.borough]));
const nycZips    = new Set(POP_DATA.map(d => d.zip));

const pops = POP_DATA.map(d => d.pop).filter(v => v > 0);
color.domain(d3.extent(pops));

d3.json("ny_zip_map.json").then(function(geoData) {

    const nycFeatures = geoData.features.filter(f => nycZips.has(getZip(f.properties)));
    console.log("NYC features found:", nycFeatures.length, "of", geoData.features.length);

    const nycGeo = { type: "FeatureCollection", features: nycFeatures };
    const projection = d3.geoMercator().fitSize([width, height], nycGeo);
    const path = d3.geoPath().projection(projection);

    svg.selectAll("path")
        .data(nycFeatures)
        .enter().append("path")
        .attr("d", path)
        .attr("fill", function(d) {
            const val = valueMap.get(getZip(d.properties));
            return val > 0 ? color(val) : "#ccc";
        })
        .attr("stroke", "white")
        .attr("stroke-width", 0.7)
        .on("mousemove", function(d) {
            const zip = getZip(d.properties);
            const val = valueMap.get(zip);
            const bor = boroughMap.get(zip);
            tooltip.style("opacity", 1)
                .html("<strong>ZIP:</strong> " + zip + "<br>" +
                      (bor ? "<strong>Borough:</strong> " + bor + "<br>" : "") +
                      "<strong>Population:</strong> " + (val ? val.toLocaleString() : "0"))
                .style("left", (d3.event.pageX + 14) + "px")
                .style("top",  (d3.event.pageY - 36) + "px");
        })
        .on("mouseout", function() { tooltip.style("opacity", 0); });

    const bw = 46, bh = 16;
    const leg = svg.append("g").attr("transform", "translate(18,18)");

    leg.append("rect")
        .attr("x", -8).attr("y", -22)
        .attr("width", 7 * bw + 24).attr("height", bh + 42)
        .attr("fill","white").attr("opacity",.8).attr("rx",5);

    leg.append("text").attr("y",-6).attr("font-size","12px")
        .attr("font-weight","bold").text("Population per ZIP");

    const legData = color.range().map(c => {
        const [lo, hi] = color.invertExtent(c);
        return { color: c, lo, hi };
    });

    leg.selectAll("rect.b").data(legData).enter()
        .append("rect").attr("class","b")
        .attr("x",(d,i)=>i*bw).attr("y",0)
        .attr("width",bw).attr("height",bh)
        .attr("fill",d=>d.color);

    leg.selectAll("text.l").data(legData).enter()
        .append("text").attr("class","l")
        .attr("x",(d,i)=>i*bw).attr("y",bh+14)
        .attr("font-size","10px")
        .text(d => d.lo != null ? Math.round(d.lo/1000)+"k" : "");

    const nx = legData.length * bw + 8;
    leg.append("rect").attr("x",nx).attr("y",0)
        .attr("width",bw).attr("height",bh).attr("fill","#ccc");
    leg.append("text").attr("x",nx).attr("y",bh+14)
        .attr("font-size","10px").text("~0 pop");

}).catch(err => {
    d3.select("body").append("p").style("color","red")
        .text("Could not load ny_zip_map.json: " + err.message);
});
